spring:
  config:
    activate:
      on-profile: staging

  datasource:
    url: jdbc:mariadb://${DB_HOST}:3306/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    user: ${FLYWAY_USER}
    password: ${FLYWAY_PASSWORD}

  security:
    user:
      name: ${SPRING_SECURITY_USERNAME}
      password: ${SPRING_SECURITY_PASSWORD}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000 # 1h

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

swagger:
  enabled: false

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
        exclude:
          - env
          - beans
          - mappings
          - configprops
          - threaddump
          - heapdump
          - flyway
  endpoint:
    health:
      show-details: always

app:
  api:
    prefix: ${API_PREFIX:/api}
  frontend:
    url: ${FRONTEND_URL}
  setup_password:
    expires: ${SETUP_PASSWORD_TOKEN_EXPIRATION}
  reset_password:
    expires: ${RESET_PASSWORD_TOKEN_EXPIRATION}

  platform:
    display_name: ${PLATFORM_DISPLAY_NAME}
    no_reply_mail: ${PLATFORM_NO_REPLY_MAIL}
    support_mail: ${PLATFORM_SUPPORT_MAIL}
    primary_dark_color: ${PLATFORM_PRIMARY_DARK_COLOR}
    accent_light_color: ${PLATFORM_ACCENT_LIGHT_COLOR}

  aws:
    region: ${AWS_REGION}

  minio:
    accessKey: ${MINIO_ACCESS_KEY}
    secretKey: ${MINIO_SECRET_KEY}
    endpoint: ${MINIO_ENDPOINT}
    bucketName: ${MINIO_BUCKET_NAME}