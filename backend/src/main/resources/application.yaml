spring:
  application:
    name: logistics-platform

  datasource:
    url: jdbc:mariadb://${DB_HOST}:3306/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    user:
      name: ${SPRING_SECURITY_USERNAME}
      password: ${SPRING_SECURITY_PASSWORD}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000 # 1h

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 3MB

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

swagger:
  enabled: false

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  api:
    prefix: ${API_PREFIX:/api}
  frontend:
    url: ${FRONTEND_URL}
  cache:
    ttls:
      analytics: 5m
      metadata: 20m
      vehicles: 15m
  setup_password:
    expires: ${SETUP_PASSWORD_TOKEN_EXPIRATION}
  reset_password:
    expires: ${RESET_PASSWORD_TOKEN_EXPIRATION}

  platform:
    display_name: ${PLATFORM_DISPLAY_NAME}
    no_reply_mail: ${PLATFORM_NO_REPLY_MAIL}
    support_mail: ${PLATFORM_SUPPORT_MAIL}
    primary_dark_color: ${PLATFORM_PRIMARY_DARK_COLOR}
    accent_light_color: ${PLATFORM_ACCENT_LIGHT_COLOR}

  aws:
    region: ${AWS_REGION}

  minio:
    accessKey: ${MINIO_ACCESS_KEY}
    secretKey: ${MINIO_SECRET_KEY}
    endpoint: ${MINIO_ENDPOINT}
    publicEndpoint: ${MINIO_PUBLIC_ENDPOINT}
    bucketName: ${MINIO_BUCKET_NAME}
    bucketPathQuotes: ${MINIO_BUCKET_PATH_QUOTES}
    bucketPathCmr: ${MINIO_BUCKET_PATH_CMR}
    bucketPathReconciliationReport: ${MINIO_BUCKET_PATH_RECONCILIATION_REPORT}
    bucketPathSuppliers: ${MINIO_BUCKET_PATH_SUPPLIERS}
    bucketPathCompanyProfile: ${MINIO_BUCKET_PATH_COMPANY_PROFILE}