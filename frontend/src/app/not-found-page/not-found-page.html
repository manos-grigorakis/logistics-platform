<section class="flex items-center justify-center min-h-screen text-center px-20">
  <div>
    <h2 class="text-5xl font-bold">404</h2>
    <h3 class="text-2xl font-medium mt-1 mb-2">Page not found</h3>
    <p>The page you are trying to access does not exist or has been moved.</p>
    <div class="mt-6 max-w-xs mx-auto">
      @if (!authService.isAuthenticated()) {
      <app-primary-button value="Back to Login" routerLink="/login"></app-primary-button>
      } @else {
      <app-primary-button value="Back to Dashboard" routerLink="/dashboard"></app-primary-button>
      }
    </div>
  </div>
</section>
