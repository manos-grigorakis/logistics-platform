<nav class="bg-secondary-900 border-secondary-50 fixed top-0 z-50 w-full border-b">
  <div class="px-3 py-3 lg:px-5 lg:pl-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center justify-start rtl:justify-end">
        <!-- Burger button -->
        <button
          (click)="onBurgerClick()"
          aria-controls="top-bar-sidebar"
          class="box-border border border-transparent bg-transparent p-2 text-sm leading-5 font-medium hover:cursor-pointer focus:outline-none"
          type="button"
        >
          <span class="sr-only">Open sidebar</span>
          <svg
            aria-hidden="true"
            class="h-6 w-6"
            fill="none"
            height="24"
            viewBox="0 0 24 24"
            width="24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M5 7h14M5 12h14M5 17h10"
              stroke="white"
              stroke-linecap="round"
              stroke-width="2"
            />
          </svg>
        </button>
        <a class="ms-2 flex md:me-24" routerLink="/dashboard">
          <!-- <img src="" class="h-6 me-3" alt="Logo" /> -->
          <span class="self-center text-lg font-semibold whitespace-nowrap text-white">{{
            'app.title' | translate
          }}</span>
        </a>
      </div>

      <!-- Dropdown -->
      <app-dropdown-button [applyBorderButton]="false" [label]="''">
        <ng-icon
          class="border-0 outline-0"
          color="#ffffff"
          dropdown-left-icon
          name="lucideUserCircle"
          size="30"
        />
        <!-- Items -->
        <app-dropdown-menu-item
          [label]="'nav.top-nav.company' | translate"
          dropdown-menu-item
          icon="lucideBriefcaseBusiness"
          route="company-profile/edit"
        />

        <app-dropdown-menu-item
          (click)="logout()"
          [label]="'nav.top-nav.logout' | translate"
          dropdown-menu-item
          icon="lucideLogOut"
        />
      </app-dropdown-button>
    </div>
  </div>
</nav>
