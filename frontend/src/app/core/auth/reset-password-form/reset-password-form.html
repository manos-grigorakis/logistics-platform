<section class="flex min-h-screen items-center justify-center">
  @if (isLoading) {
    <app-loading-spinner />
  }

  <div class="w-full max-w-lg rounded-lg bg-white p-8 shadow-md">
    <app-auth-header />

    <h2 class="mb-8 text-center text-3xl font-semibold">
      {{ 'auth.reset-password.title' | translate }}
    </h2>

    @if (errorMessage) {
      <div class="mb-5">
        <app-error-alert [errorMessage]="errorMessage | translate" />
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-6">
        <app-main-input
          [label]="'auth.reset-password.new-password' | translate"
          placeholder="New Password"
          type="password"
          formControlName="newPassword"
        />
      </div>

      <app-primary-button
        [value]="'auth.reset-password.button' | translate"
        [isDisabled]="isLoading"
      />
    </form>
  </div>
</section>
