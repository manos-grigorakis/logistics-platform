<app-auth-layout
  [isLoading]="isLoading"
  [header]="'auth.reset-password.title' | translate"
  [errorMessage]="errorMessage | translate"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-6">
      <app-main-input
        [label]="'auth.reset-password.new-password' | translate"
        placeholder="New Password"
        type="password"
        formControlName="newPassword"
      />
    </div>

    <app-primary-button
      [value]="'auth.reset-password.button' | translate"
      [isDisabled]="isLoading"
    />
  </form>
</app-auth-layout>
