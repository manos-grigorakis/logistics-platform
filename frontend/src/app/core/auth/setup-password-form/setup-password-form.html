<app-auth-layout
  [isLoading]="isLoading"
  [header]="'auth.setup-password.title' | translate"
  [errorMessage]="errorMessage | translate"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-6">
      <app-main-input
        [label]="'auth.password' | translate"
        placeholder="Password"
        type="password"
        formControlName="password"
      />
    </div>

    <app-primary-button
      [value]="'auth.setup-password.button' | translate"
      [isDisabled]="isLoading"
    />
  </form>
</app-auth-layout>
