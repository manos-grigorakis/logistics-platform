<section class="flex min-h-screen items-center justify-center">
  @if (isLoading) {
    <app-loading-spinner />
  }

  <div class="w-full max-w-lg rounded-lg bg-white p-8 shadow-md">
    <app-auth-header />

    <h2 class="mb-8 text-center text-3xl font-semibold">
      @if (successMessage) {
        {{ 'auth.forgot-password.check-your-email' | translate }}
      } @else {
        {{ 'auth.forgot-password.title' | translate }}
      }
    </h2>

    @if (errorMessage) {
      <div class="mb-5">
        <app-error-alert [errorMessage]="errorMessage | translate" />
      </div>
    }

    @if (successMessage) {
      <div class="mb-5">
        <span class="text-success bg-success-light block w-full rounded-md p-1.5 text-center">
          {{ successMessage | translate }}
        </span>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-6">
          <app-main-input label="Email" placeholder="Email" type="email" formControlName="email" />
        </div>
        <app-primary-button
          [value]="'common.actions.submit' | translate"
          [isDisabled]="isLoading"
        />
      </form>
    }

    <a
      routerLink="/login"
      class="text-secondary-500 hover:text-secondary-800 mt-4 block text-center text-sm transition-colors duration-200 ease-in-out hover:underline"
    >
      {{ 'auth.back-to-login' | translate }}
    </a>
  </div>
</section>
