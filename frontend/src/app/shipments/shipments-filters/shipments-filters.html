<div class="flex items-center justify-between space-x-4 p-4">
  <app-search-bar
    placeholder="Search"
    [value]="searchTerm"
    (valueChange)="onSearchChange($event)"
  />

  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4">
      <!-- Add -->
      <app-rounded-icon-button
        routerLink="create-shipment"
        icon="lucidePlus"
        color="success"
      ></app-rounded-icon-button>

      <!-- Refresh -->
      <app-rounded-icon-button
        (clicked)="loadShipments()"
        [isDisabled]="isLoading"
        icon="lucideRefreshCcw"
        color="info"
      ></app-rounded-icon-button>
    </div>

    <!-- Sort -->
    <app-dropdown-button [label]="sortLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>

      <!-- Menu Items -->
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-all')"
          >All</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-asc-by-number')"
          >Number (A → Z)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-desc-by-number')"
          >Number (Z → A)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-asc-by-pickup')"
          >Pickup (A → Z)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-desc-by-pickup')"
          >Pickup (Z → A)</a
        >
      </li>
    </app-dropdown-button>

    <!-- Filter -->
    <app-dropdown-button [label]="filterLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-all')"
          >All</a
        >
      </li>
      @for (status of shipmentStatuses; track $index) {
        <li dropdown-menu-item>
          <a
            class="inline-flex w-full items-center p-2 text-sm text-gray-600 capitalize hover:cursor-pointer hover:text-black"
            (click)="onFilterByFieldClick(`filter-by-shipment-status-${status.label}`)"
          >
            {{ status.label }}
          </a>
        </li>
      }
    </app-dropdown-button>
  </div>
</div>
