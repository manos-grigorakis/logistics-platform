<div class="relative overflow-x-auto rounded-lg bg-white shadow-md">
  <app-shipments-table
    [isLoading]="isLoading"
    [shipments]="shipments"
    [errorMessage]="errorMessage"
  />
</div>
<div class="mt-8">
  <app-pagination
    [currentPage]="currentPage"
    [totalElements]="totalElements"
    [totalPages]="totalPages"
    [pageSize]="pageSize"
    (pageChanged)="onPageChange($event)"
  />
</div>
