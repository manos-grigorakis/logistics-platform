<section class="flex min-h-screen items-center justify-center px-20 text-center">
  <div>
    <h2 class="text-5xl font-bold">403</h2>
    <h3 class="mt-1 mb-2 text-2xl font-medium">{{ 'pages.forbidden.title' | translate }}</h3>
    <p>{{ 'pages.forbidden.subtitle' | translate }}</p>
    <div class="mx-auto mt-6 max-w-xs">
      @if (!authService.isAuthenticated()) {
        <app-primary-button
          [value]="'common.actions.back-to-login' | translate"
          routerLink="/login"
        />
      } @else {
        <app-primary-button
          [value]="'common.actions.back-to-dashboard' | translate"
          routerLink="/dashboard"
        />
      }
    </div>
  </div>
</section>
