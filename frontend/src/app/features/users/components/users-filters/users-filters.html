<div class="flex items-center justify-between space-x-4 p-4">
  <app-search-bar [value]="searchTerm" (valueChange)="onSearchChange($event)" />

  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4">
      <!-- Add -->
      <app-rounded-icon-button (clicked)="onCreateUser()" icon="lucidePlus" color="success" />

      <!-- Refresh -->
      <app-rounded-icon-button
        (clicked)="loadUsers()"
        [isDisabled]="isLoading"
        icon="lucideRefreshCcw"
        color="info"
      />

      <!-- Delete -->
      <app-rounded-icon-button
        (clicked)="onDeleteClick()"
        [isDisabled]="isDeleteDisabled"
        icon="lucideTrash"
        color="danger"
      />
    </div>

    <!-- Filters -->
    <app-dropdown-button [label]="sortLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>

      <!-- Menu Items -->
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('all')"
          >{{ 'common.filters.all' | translate }}</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('asc-by-first-name')"
          >{{ 'users.fields.first-name' | translate }} (A-Z)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('desc-by-first-name')"
          >{{ 'users.fields.first-name' | translate }} (Z-A)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('asc-by-last-name')"
          >{{ 'users.fields.last-name' | translate }} (A-Z)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('desc-by-last-name')"
          >{{ 'users.fields.last-name' | translate }} (Z-A)</a
        >
      </li>
    </app-dropdown-button>
  </div>
</div>
