<div [formGroup]="parentForm">
  <h3 class="mb-4 text-lg font-semibold">{{ 'quotes.messages.additional-info' | translate }}</h3>
  <!-- Notes -->
  <div class="mb-6">
    <label (click)="onClickFocusEditor(editorNotes)">{{ 'quotes.fields.notes' | translate }}</label>
    <div class="NgxEditor__Wrapper mt-1">
      <ngx-editor-menu [editor]="editorNotes" [toolbar]="toolbar" />
      <ngx-editor
        formControlName="notes"
        [editor]="editorNotes"
        [placeholder]="('quotes.fields.placeholders.notes' | translate) + '...'"
      />
    </div>
  </div>

  <!-- Special Terms -->
  <div>
    <label (click)="onClickFocusEditor(editorSpecialTerms)">{{
      'quotes.fields.special-terms' | translate
    }}</label>
    <div class="NgxEditor__Wrapper mt-1">
      <ngx-editor-menu [editor]="editorSpecialTerms" [toolbar]="toolbar" />
      <ngx-editor
        formControlName="specialTerms"
        [editor]="editorSpecialTerms"
        [placeholder]="('quotes.fields.placeholders.special-terms' | translate) + '...'"
      />
    </div>
  </div>
</div>
