<div class="mx-auto mt-6 max-w-3xl rounded-lg bg-white p-6 shadow-lg shadow-black/10">
  <h2 class="mb-4 text-center text-3xl font-semibold">
    @if (formUsage === 'create') {
      {{ 'quotes.actions.create' | translate }}
    } @else {
      {{ 'quotes.actions.update' | translate }}
    }
  </h2>

  @if (isLoading) {
    <app-loading-spinner />
  }

  <div class="mb-5">
    @if (errorMessage) {
      <app-error-alert [errorMessage]="errorMessage" />
    }
  </div>
  <div class="mb-5">
    @if (itemsErrorMessage) {
      <app-error-alert [errorMessage]="itemsErrorMessage | translate" />
    }
  </div>
  <div class="mb-5">
    @if (customerErrorMessage) {
      <app-error-alert [errorMessage]="customerErrorMessage | translate" />
    }
  </div>

  <form [formGroup]="quoteForm" (ngSubmit)="onSubmitClick()">
    <!-- Basic information -->
    <div class="mb-6">
      <app-basic-information
        [parentForm]="quoteForm"
        [customersList]="customersList"
        [customersLoading]="customersLoading"
        [customerSearch$]="customerSearch$"
      />
    </div>

    <!-- Services & Items -->
    <div class="mb-6">
      <app-services-and-items
        [parentForm]="quoteForm"
        [items]="items"
        [quoteItemUnits]="quoteItemUnits"
        (onAddItem)="onClickAddItem()"
        (onRemoveItem)="onClickRemoveItem($event)"
      />
    </div>

    <!-- Additional Information -->
    <div class="mb-6">
      <app-additional-information
        [parentForm]="quoteForm"
        (notesHtmlChange)="notesHtml = $event"
        (specialTermsHtmlChange)="specialTermsHtml = $event"
      />
    </div>

    <!-- Button -->
    @if (formUsage === 'create') {
      <app-primary-button [value]="'quotes.actions.create' | translate" [isDisabled]="isLoading" />
    } @else {
      <app-primary-button [value]="'quotes.actions.update' | translate" [isDisabled]="isLoading" />
    }
  </form>
</div>
