<app-shipments-filters
  [shipmentStatuses]="statuses"
  [sortLabel]="sortLabel"
  [filterLabel]="filterLabel"
  [showCreateButton]="false"
  [showDatesFilters]="false"
  (searchChanged)="onSearchChanged($event)"
  (refresh)="onRefreshClick()"
  (sortBy)="onSort($event)"
  (filterBy)="onFilter($event)"
/>

@if (isLoading) {
  <app-loading-spinner />
}

<!-- Shipment Status Confirm Modal -->
<app-modal
  icon="lucideAlertTriangle"
  color="warning"
  [header]="'customers.messages.shipments.modal.header-update' | translate"
  [isEnabled]="isShipmentStatusConfirmModalOpen"
  [message]="confirmShipmentStatusModalMessage"
  (confirmClick)="onConfirmShipmentStatusModal()"
  (closeModalClick)="onCloseStatusConfirmModal()"
  (cancelClick)="onCloseStatusConfirmModal()"
/>

<!-- Shipment Status Error Modal -->
<app-modal
  icon="lucideAlertTriangle"
  color="warning"
  [header]="'customers.messages.shipments.modal.title' | translate"
  [confirmButtonText]="'common.actions.cancel' | translate"
  confirmButtonColor="warning"
  [isEnabled]="isShipmentStatusErrorModalOpen"
  [message]="changeStatusError | translate"
  [showCancelButton]="false"
  (closeModalClick)="onCloseStatusErrorModal()"
  (confirmClick)="onCloseStatusErrorModal()"
/>

<div class="flex flex-col" [ngClass]="{ 'min-h-[630px]': shipments.length > 0 }">
  @if (errorMessage) {
    <app-error-alert [errorMessage]="errorMessage | translate" />
  }

  @if (!isLoading && !errorMessage && shipments.length === 0) {
    <div class="text-secondary-500 p-6 text-center">
      {{ 'customers.messages.shipments.empty-state' | translate }}
    </div>
  } @else {
    <div class="flex flex-1 flex-col gap-4 px-2">
      @for (shipment of shipments; track shipment.id) {
        <app-shipments-card
          [shipment]="shipment"
          [shipmentStatuses]="statuses"
          [editingShipmentId]="editingShipmentId"
          [pendingShipmentStatus]="pendingShipmentStatus"
          (onStatus)="onShipmentStatusUpdate($event)"
        />
      }
    </div>

    <!-- Pagination -->
    @if (shipments.length > 0) {
      <!--      <div class="mt-8">-->
      <!--        <app-pagination-->
      <!--          [currentPage]="currentPage"-->
      <!--          [totalPages]="totalPages"-->
      <!--          [totalElements]="totalElements"-->
      <!--          [pageSize]="pageSize"-->
      <!--          (pageChanged)="onPageChange($event)"-->
      <!--        />-->
      <!--      </div>-->
    }
  }
</div>
