<div>
  <div class="relative overflow-x-auto rounded-lg bg-white shadow-md">
    <app-supplier-payments-table [isLoading]="isLoading" [supplierPayment]="payments" />
  </div>

  <!-- Pagination -->
  @if (payments.length > 0) {
    <div class="mt-8">
      <app-pagination
        [currentPage]="currentPage"
        [totalElements]="totalElements"
        [totalPages]="totalPages"
        [pageSize]="pageSize"
        (pageChanged)="onPageChange($event)"
      />
    </div>
  }
</div>
