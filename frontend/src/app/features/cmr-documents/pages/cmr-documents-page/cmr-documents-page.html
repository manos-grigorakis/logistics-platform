<div>
  <div class="border-primary-500 mb-8 rounded border-b-5 shadow-md">
    <app-cmr-documents-filters
      [isLoading]="isLoading"
      [searchPlaceholder]="searchPlaceholder"
      [sortLabel]="activeSortLabel"
      [filterLabel]="activeFilterLabel"
      [filterOptions]="filterOptions"
      (searchChanged)="onSearchChanged($event)"
      (onRefreshDocuments)="onRefreshClick()"
      (onSortByField)="onSortByField($event)"
      (onFilterByField)="onFilterByField($event)"
    />
  </div>

  <app-modal-file
    [isEnabled]="isModalOpen"
    [pdfUrl]="documentUrl"
    [pdfName]="documentNumber"
    [showSendViaMailButton]="false"
    (closeModal)="isModalOpen = false"
  />

  <div class="relative overflow-x-auto rounded-lg bg-white shadow-md">
    <app-cmr-documents-table
      [isLoading]="isLoading"
      [cmrDocuments]="documents"
      [cmrDocumentsStatuses]="filterOptions"
      [errorMessage]="errorMessage | translate"
      (onDocument)="onDocumentClick($event)"
      (onStatus)="onStatusUpdateChange($event)"
      (onDownloadCopies)="onDownloadCopiesClick($event)"
    />
  </div>

  @if (documents.length > 0) {
    <div class="mt-8">
      <app-pagination [page]="page" (pageChanged)="onPageChange($event)" />
    </div>
  }
</div>
