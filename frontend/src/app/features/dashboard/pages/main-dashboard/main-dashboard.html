<div>
  <!-- KPIs -->
  <div class="grid grid-cols-1 gap-2 sm:grid-cols-2 lg:grid-cols-4">
    <app-kpi-card [label]="'dashboard.total-customers' | translate" [value]="totalCustomers" />
    <app-kpi-card [label]="'dashboard.total-shipments' | translate" [value]="totalShipments" />
    <app-kpi-card
      [label]="'dashboard.total-outstanding-amount' | translate"
      [value]="(totalOutstandingAmount | currency: 'EUR') || '-'"
    />
    <app-kpi-card
      [label]="'dashboard.total-pending-shipments' | translate"
      [value]="totalPendingShipments"
    />
  </div>

  <!-- Charts -->
  <div class="mt-6 grid grid-cols-1 gap-2 md:grid-cols-2 lg:grid-cols-5">
    <div
      class="col-span-1 rounded-md border border-gray-100 bg-white px-4 py-4 shadow-sm md:col-span-3"
    >
      <p class="mb-2 text-sm font-medium text-gray-600">
        {{ 'dashboard.quotes-by-status' | translate }}
      </p>
      <canvas baseChart [data]="quotesByStatusChartData" [type]="'bar'"></canvas>
    </div>

    <div
      class="col-span-1 flex flex-col rounded-md border border-gray-100 bg-white px-4 py-4 shadow-sm"
    >
      <p class="mb-2 text-sm font-medium text-gray-600">
        {{ 'dashboard.shipments-by-status' | translate }}
      </p>
      <div class="flex flex-1 items-center justify-center">
        <canvas
          baseChart
          [data]="shipmentsByStatusChartData"
          [type]="'pie'"
          [options]="pieChartOptions"
        ></canvas>
      </div>
    </div>

    <div
      class="col-span-1 flex flex-col rounded-md border border-gray-100 bg-white px-4 py-4 shadow-sm"
    >
      <p class="mb-2 text-sm font-medium text-gray-600">
        {{ 'dashboard.invoices-by-status' | translate }}
      </p>

      <div class="flex flex-1 items-center justify-center">
        <canvas
          baseChart
          [data]="invoicesByStatusChartData"
          [type]="'pie'"
          [options]="pieChartOptions"
        ></canvas>
      </div>
    </div>
  </div>
</div>
