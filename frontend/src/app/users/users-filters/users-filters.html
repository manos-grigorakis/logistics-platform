<div class="flex items-center justify-between space-x-4 p-4">
  <app-search-bar></app-search-bar>

  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4">
      <!-- Add -->
      <app-rounded-icon-button icon="lucidePlus" color="success"></app-rounded-icon-button>

      <!-- Refresh -->
      <app-rounded-icon-button
        (clicked)="loadUsers()"
        [isDisabled]="isLoading"
        icon="lucideRefreshCcw"
        color="info"
      ></app-rounded-icon-button>

      <!-- Delete -->
      <app-rounded-icon-button
        [isDisabled]="true"
        icon="lucideTrash"
        color="danger"
      ></app-rounded-icon-button>
    </div>

    <!-- Filters -->
    <app-dropdown-button label="Filter by">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>

      <!-- Menu Items -->
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          >Ascending First Name</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          >Descending First Name</a
        >
      </li>
    </app-dropdown-button>
  </div>
</div>
