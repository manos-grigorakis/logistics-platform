<div>
  <div class="border-primary-500 mb-8 rounded border-b-5 shadow-md">
    <app-users-filters
      [sortLabel]="sortLabel"
      [isLoading]="isLoading"
      [isDeleteDisabled]="disableDeleteButton"
      (deleteClick)="onUserDeleteClick()"
      (searchChanged)="onSearchChanged($event)"
      (sortBy)="onSort($event)"
      (refresh)="loadUsers()"
    />
  </div>
  <app-modal
    (closeModalClick)="hideModal()"
    (confirmClick)="handleDelete()"
    (cancelClick)="hideModal()"
    [isEnabled]="showModal"
    color="danger"
    icon="lucideAlertTriangle"
    [confirmButtonText]="'common.actions.delete' | translate"
    [cancelButtonText]="'common.actions.cancel' | translate"
    [header]="modalHeader | translate"
    [message]="modalMessage | translate"
  />
  <div class="relative overflow-x-auto rounded-lg bg-white shadow-md">
    <app-users-table
      [isLoading]="isLoading"
      [users]="displayedUsers"
      [selectedUserIds]="selectedUserIds"
      [errorMessage]="errorMessage | translate"
      [currentUserId]="currentUserId ?? undefined"
      (toggleUserSelection)="toggleUserSelection($event)"
    ></app-users-table>
  </div>
</div>
