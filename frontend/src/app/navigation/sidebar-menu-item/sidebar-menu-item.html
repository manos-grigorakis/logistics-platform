<li>
  <a
    [routerLink]="route"
    routerLinkActive="bg-secondary-800 text-white"
    class="text-body text-secondary-400 hover:bg-secondary-800 flex items-center rounded px-2 py-1.5 hover:cursor-pointer hover:text-white"
  >
    <ng-icon [name]="icon"></ng-icon>
    <span class="ms-3 flex-1 whitespace-nowrap">{{ label }}</span>
    <span
      class="bg-warning-dark border-warning-dark ms-2 hidden h-4.5 w-4.5 justify-center rounded-full border text-xs font-medium"
      [class.inline-flex]="badgeValue"
      >{{ badgeValue }}</span
    >
  </a>
</li>
