<aside
  class="bg-secondary-900 fixed left-0 z-40 h-full w-full text-white sm:w-64"
  [class.-translate-x-full]="!isOpen"
  [class.translate-x-0]="isOpen"
  [class.transition-none]="disableSidebarTransition"
  [class.transition-transform]="!disableSidebarTransition"
  [class.duration-200]="!disableSidebarTransition"
  aria-label="Sidebar"
>
  <div class="h-full overflow-y-auto px-3 py-4">
    <ul class="flex flex-col gap-2 font-medium">
      <app-sidebar-menu-item
        route="/dashboard"
        icon="lucidePieChart"
        label="Dashboard"
        (onItemClick)="closeOnMobile()"
      />
      @if (isAdmin) {
        <app-sidebar-menu-item
          route="/users"
          icon="lucideUsers"
          label="Users"
          (onItemClick)="closeOnMobile()"
        />
        <app-sidebar-menu-item
          route="/roles"
          icon="lucideUserCog"
          label="Roles"
          (onItemClick)="closeOnMobile()"
        />
      }
      <app-sidebar-menu-item
        route="/customers"
        icon="lucideBuilding"
        label="Customers"
        (onItemClick)="closeOnMobile()"
      />
      <app-sidebar-menu-item
        route="/vehicles"
        icon="lucideTruck"
        label="Vehicles"
        (onItemClick)="closeOnMobile()"
      />
      <app-sidebar-menu-item
        route="/quotes"
        icon="lucideFileText"
        label="Quotes"
        (onItemClick)="closeOnMobile()"
      />
      <app-sidebar-menu-item
        route="/shipments"
        icon="lucideFileBox"
        label="Shipments"
        (onItemClick)="closeOnMobile()"
      />
      <app-sidebar-menu-item
        route="/payments-tracking"
        icon="lucideScale"
        label="Payments Tracking"
        (onItemClick)="closeOnMobile()"
      />
    </ul>
  </div>
</aside>
