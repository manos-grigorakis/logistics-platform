<aside
  class="fixed left-0 z-40 sm:w-64 w-full h-full text-white transition-transform duration-200 bg-secondary-900"
  [class.-translate-x-full]="!isOpen"
  [class.translate-x-0]="isOpen"
  aria-label="Sidebar"
>
  <div class="h-full px-3 py-4 overflow-y-auto">
    <ul class="flex flex-col gap-2 font-medium">
      <app-sidebar-menu-item
        route="#"
        icon="lucidePieChart"
        label="Dashboard"
      ></app-sidebar-menu-item>
      <app-sidebar-menu-item route="#" icon="lucideUsers" label="Users"></app-sidebar-menu-item>
      <app-sidebar-menu-item route="#" icon="lucideUserCog" label="Roles"></app-sidebar-menu-item>
      <app-sidebar-menu-item
        route="#"
        icon="lucideTruck"
        label="Deliveries"
      ></app-sidebar-menu-item>
      <app-sidebar-menu-item
        route="#"
        icon="lucideBuilding"
        label="Customers"
      ></app-sidebar-menu-item>
    </ul>
  </div>
</aside>
