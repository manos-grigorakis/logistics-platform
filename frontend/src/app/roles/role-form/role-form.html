<div class="mx-auto mt-6 max-w-xl rounded-lg bg-white p-6 shadow-lg shadow-black/10">
  <h2 class="mb-4 text-center text-3xl font-semibold">
    @if (formUsage === 'create') {
      {{ 'roles.actions.create' | translate }}
    } @else {
      {{ 'roles.actions.update' | translate }}
    }
  </h2>

  @if (isLoading) {
    <app-loading-spinner />
  }

  <div class="mb-5">
    @if (errorMessage) {
      <app-error-alert [errorMessage]="errorMessage" />
    }
  </div>

  <form [formGroup]="roleForm" (ngSubmit)="onSubmit()">
    <div class="mb-6">
      <app-main-input
        formControlName="name"
        [label]="'roles.fields.name' | translate"
        [placeholder]="'roles.fields.name' | translate"
        type="text"
        [showRequiredStar]="true"
      />
    </div>
    <div class="mb-6">
      <label for="description" class="mb-1 block">{{
        'roles.fields.description' | translate
      }}</label>
      <textarea
        formControlName="description"
        id="description"
        rows="4"
        class="focus:ring-primary-200 placeholder:text-body w-full resize-none rounded border border-gray-300 px-4 py-2 text-gray-700 focus:ring focus:outline-none"
        [placeholder]="'roles.fields.description-placeholder' | translate"
      ></textarea>
    </div>

    @if (formUsage === 'create') {
      <app-primary-button [value]="'roles.actions.create' | translate" [isDisabled]="isLoading" />
    } @else {
      <app-primary-button [value]="'roles.actions.update' | translate" [isDisabled]="isLoading" />
    }
  </form>
</div>
