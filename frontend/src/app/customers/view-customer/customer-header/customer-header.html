@if (customer) {
  <div class="mb-8 flex flex-col gap-1 rounded bg-white p-4 shadow-sm">
    <div class="flex">
      <h2 class="text-2xl font-semibold">{{ customer.companyName }}</h2>
      <div>
        <span
          class="ml-4 rounded border px-2 text-sm"
          [ngClass]="customerTypeBadgeColor(customer.customerType)"
        >
          {{ 'metadata.customers-types.' + customer.customerType.toLowerCase() | translate }}
        </span>
      </div>
    </div>
    <h3 class="font-medium text-gray-500">
      {{ 'customers.fields.tin' | translate }}: {{ customer.tin }}
    </h3>
  </div>
}
