<div>
  <div class="border-primary-500 mb-8 rounded border-b-5 shadow-md">
    <app-customers-filters (searchChanged)="onSearchChanged($event)" />
  </div>
  <div class="relative overflow-x-auto rounded-lg bg-white shadow-md">
    <app-customers-table
      [isLoading]="isLoading"
      [customers]="customers"
      [errorMessage]="errorMessage"
      [selectedCustomersIds]="selectCustomerIds"
      (toggleCustomerSelection)="toggleCustomerSelection($event)"
    />
  </div>
  <div class="mt-8">
    <app-pagination
      [currentPage]="currentPage"
      [totalElements]="totalElements"
      [totalPages]="totalPages"
      [pageSize]="pageSize"
      (pageChanged)="onPageChange($event)"
    />
  </div>
</div>
