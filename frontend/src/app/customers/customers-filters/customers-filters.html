<div class="flex items-center justify-between space-x-4 p-4">
  <app-search-bar
    placeholder="Search by TIN or Company Name"
    [value]="searchTerm"
    (valueChange)="onSearchChange($event)"
  ></app-search-bar>

  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4">
      <!-- Add -->
      <app-rounded-icon-button
        (clicked)="onCreateCustomer()"
        icon="lucidePlus"
        color="success"
      ></app-rounded-icon-button>

      <!-- Refresh -->
      <app-rounded-icon-button
        (clicked)="loadCustomers()"
        [isDisabled]="isLoading"
        icon="lucideRefreshCcw"
        color="info"
      ></app-rounded-icon-button>

      <!-- Delete -->
      <app-rounded-icon-button
        (clicked)="onDeleteClick()"
        [isDisabled]="isDeleteDisabled"
        icon="lucideTrash"
        color="danger"
      ></app-rounded-icon-button>
    </div>

    <!-- Sort -->
    <app-dropdown-button [label]="sortLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>

      <!-- Menu Items -->
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('sort-all')"
          >All</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('sort-asc-by-company-name')"
          >Company Name (A → Z)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByField('sort-desc-by-company-name')"
          >Company Name (Z → A)</a
        >
      </li>
    </app-dropdown-button>

    <!-- Filter -->
    <app-dropdown-button [label]="filterLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByField('filter-by-all')"
          >All</a
        >
      </li>
      @for (customerType of customerTypesData; track $index) {
        <li dropdown-menu-item>
          <a
            class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
            (click)="onFilterByField(`filter-by-customer-type-${customerType.toLowerCase()}`)"
            >{{ customerType | titlecase }}
          </a>
        </li>
      }
    </app-dropdown-button>
  </div>
</div>
