<section class="flex items-center justify-center min-h-screen">
  @if (isLoading) { <app-loading-spinner></app-loading-spinner> }

  <div class="w-full max-w-md p-6 bg-white rounded-lg shadow-md">
    <h2 class="mb-4 text-3xl font-semibold text-center">Reset Password</h2>
    <div class="mb-5">
      @if (errorMessage) {
      <span class="block w-full p-1.5 text-center rounded-md text-danger bg-danger-light">{{
        errorMessage
      }}</span>
      }
    </div>

    <div class="mb-6">
      <label for="new-password" class="block mb-1">New Password</label>
      <input
        id="new-password"
        type="password"
        placeholder="New Password"
        [formControl]="newPassword"
        class="w-full px-4 py-2 text-gray-700 border border-gray-300 rounded focus:outline-none focus:ring focus:ring-primary-200"
      />
      @if (newPassword.invalid && (newPassword.dirty || newPassword.touched)) {
      <div>
        @if (newPassword.hasError('required')) {
        <span class="ml-1 text-sm text-danger">Password is required</span>
        }
      </div>
      }
    </div>

    <app-primary-button
      value="Reset Password"
      (click)="onSubmit()"
      [isDisabled]="!newPassword.valid"
    ></app-primary-button>
  </div>
</section>
