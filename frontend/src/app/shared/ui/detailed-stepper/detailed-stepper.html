<ol class="flex items-start justify-between">
  @for (step of steps; track $index) {
    <li class="relative flex flex-1 flex-col items-center">
      <!-- Connector -->
      @if (!$first) {
        <div class="absolute top-4 right-1/2 z-0 h-0.5 w-full -translate-y-1/2 bg-zinc-300"></div>
      }

      <!-- Circle -->
      <span
        class="z-10 flex h-8 w-8 items-center justify-center rounded-full text-white"
        [ngClass]="{
          'bg-primary-500': $index <= activeStep,
          'bg-zinc-400': $index > activeStep,
        }"
      >
        {{ $index + 1 }}
      </span>

      <!-- Title -->
      <h3
        class="mt-3 text-center text-sm leading-tight font-medium"
        [ngClass]="{
          'text-black': $index === activeStep,
          'text-zinc-400': $index !== activeStep,
        }"
      >
        {{ step.title }}
      </h3>

      <!-- Active description -->
      @if ($index === activeStep && showDescription) {
        <p class="mt-1 text-center text-xs text-zinc-500">
          {{ step.description }}
        </p>
      }
    </li>
  }
</ol>
