<div
  tabindex="-1"
  class="fixed inset-0 z-50 flex h-screen w-screen items-center justify-center overflow-x-hidden overflow-y-auto bg-slate-100/50"
  [class.hidden]="!isEnabled"
>
  <div class="max-h-full w-full max-w-md p-4 md:max-w-lg">
    <div class="relative rounded-md bg-white p-4 shadow-lg md:p-6">
      <button
        type="button"
        class="text-body hover:text-heading absolute end-2.5 top-3 ms-auto inline-flex h-9 w-9 items-center justify-center rounded-md bg-transparent text-sm hover:cursor-pointer"
        (click)="onCloseModalClick()"
      >
        <ng-icon name="lucideX" />
        <span class="sr-only">Close modal</span>
      </button>
      <div class="p-4 text-center md:p-5">
        <div
          class="mx-auto flex h-16 w-16 items-center justify-center rounded-full"
          [ngClass]="iconColorContainer"
        >
          <ng-icon [name]="icon" [size]="iconSize" [color]="iconColor" />
        </div>

        <h3 class="mt-4 mb-1 text-lg font-medium text-gray-900">
          {{ header }}
        </h3>
        <p class="text-gray-600">{{ message }}</p>
        <div class="mt-6 flex w-full gap-4 md:gap-8">
          <button
            type="button"
            class="box-border flex-1 rounded-md px-4 py-2 text-sm leading-5 font-medium text-white shadow-xs hover:cursor-pointer focus:ring-0 focus:outline-none"
            [ngClass]="confirmButtonColorContainer"
            (click)="onConfirmClick()"
          >
            {{ confirmButtonText }}
          </button>
          @if (showCancelButton) {
            <button
              type="button"
              class="text-body hover:text-heading box-border flex-1 rounded-md bg-gray-300 px-4 py-2 text-sm leading-5 font-medium shadow-xs hover:cursor-pointer hover:bg-gray-400 focus:ring-0 focus:outline-none"
              (click)="onCancelClick()"
            >
              {{ cancelButtonText }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
</div>
