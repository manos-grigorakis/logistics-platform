<label class="mb-1 block">
  @if (showRequiredStar()) {
    <span class="text-danger text-sm">*</span>
  }
  {{ label() }}
  <input
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="focus:ring-primary-200 w-full rounded border px-4 py-2 text-gray-700 focus:ring focus:outline-none"
    [ngClass]="highlightBorders() && withErrors() ? 'border-red-500' : 'border-gray-300'"
  />
</label>

@if (withErrors() && displayErrors()) {
  <div>
    @if (control?.errors?.['required']) {
      <span class="text-danger ml-1 text-sm">{{ label() }} is required</span>
    }
    @if (control?.errors?.['email']) {
      <span class="text-danger ml-1 text-sm">Invalid email</span>
    }
    @if (control?.errors?.['pattern']) {
      <span class="text-danger ml-1 text-sm"> {{ label() }} {{ patternErrorMessage() }} </span>
    }
  </div>
}
