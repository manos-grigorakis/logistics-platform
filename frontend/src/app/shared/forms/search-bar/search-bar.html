<label class="sr-only" for="input-group-1">Search</label>

  >
    <ng-icon name="lucideSearch" size="16"></ng-icon>
  </div>
  <input
    class="focus:ring-primary-200 block w-full max-w-96 rounded border border-gray-400 py-2 ps-9 pe-3 text-sm text-gray-400 shadow-xs focus:text-gray-700 focus:ring focus:outline-none"
    [placeholder]="placeholder"
    type="text"
  />
</div>
