<div>
  <div class="border-primary-500 mb-8 rounded border-b-5 shadow-md">
    <app-quotes-filters
      [sortLabel]="activeSortLabel"
      [filterLabel]="activeFilterLabel"
      (sortBy)="onSort($event)"
    />
  </div>

  <app-modal-file
    [isEnabled]="showModal"
    [pdfUrl]="pdfUrl"
    [pdfName]="pdfNumber"
    (closeModal)="closeModal()"
  />

  <div class="relative overflow-x-auto rounded-lg bg-white shadow-md">
    <app-quotes-table
      [isLoading]="isLoading"
      [quotes]="quotes"
      [errorMessage]="errorMessage"
      (onViewQuote)="onViewQuoteClick($event)"
    />
  </div>
</div>
