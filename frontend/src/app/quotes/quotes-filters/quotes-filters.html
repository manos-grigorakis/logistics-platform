<div class="flex items-center justify-between space-x-4 p-4">
  <app-search-bar
    placeholder="Search by Number or Company Name"
    [value]="searchTerm"
    (valueChange)="onSearchChange($event)"
  ></app-search-bar>

  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4">
      <!-- Add -->
      <app-rounded-icon-button
        (clicked)="onCreateQuoteClick()"
        icon="lucidePlus"
        color="success"
      ></app-rounded-icon-button>

      <!-- Refresh -->
      <app-rounded-icon-button
        (clicked)="onLoadQuotesClick()"
        [isDisabled]="isLoading"
        icon="lucideRefreshCcw"
        color="info"
      ></app-rounded-icon-button>
    </div>

    <!-- Sort -->
    <app-dropdown-button [label]="sortLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>

      <!-- Menu Items -->
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-all')"
          >All</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-asc-by-number')"
          >Number (A → Z)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-desc-by-number')"
          >Number (Z → A)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-asc-by-issue-date')"
          >Issue Date (0 → 9)</a
        >
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onSortByFieldClick('sort-desc-by-issue-date')"
          >Issue Date (9 → 0)</a
        >
      </li>
    </app-dropdown-button>

    <!-- Filter -->
    <app-dropdown-button [label]="filterLabel">
      <ng-icon name="lucideFilter" size="16" dropdown-left-icon></ng-icon>
      <ng-icon name="lucideChevronDown" size="16" dropdown-right-icon></ng-icon>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-all')"
          >All</a
        >
      </li>

      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-quote-status-draft')"
        >
          Draft
        </a>
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-quote-status-sent')"
        >
          Sent
        </a>
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-quote-status-accepted')"
        >
          Accepted
        </a>
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-quote-status-rejected')"
        >
          Rejected
        </a>
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-quote-status-expired')"
        >
          Expired
        </a>
      </li>
      <li dropdown-menu-item>
        <a
          class="inline-flex w-full items-center p-2 text-sm text-gray-600 hover:cursor-pointer hover:text-black"
          (click)="onFilterByFieldClick('filter-by-quote-status-cancelled')"
        >
          Cancelled
        </a>
      </li>
    </app-dropdown-button>
  </div>
</div>
