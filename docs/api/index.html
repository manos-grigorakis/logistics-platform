<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="./public/favicons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./public/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./public/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./public/favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="./public/favicons/site.webmanifest" />

    <link rel="stylesheet" href="./styles.css" />
    <title>Logistics Platform API Docs</title>
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">
        <img src="./assets/logo-light.svg" alt="Logistics Platform logo" />
        <span>Logistics Platform API</span>
      </div>
    </header>

    <redoc
      spec-url="./open-api.json"
      theme='{
        "colors": {
            "primary": {
              "main": "#2563eb"
            },
            "success": {
              "main": "#16a34a"
            },
            "error": {
              "main": "#dc2626"
            }
        },
        "sidebar": {
          "backgroundColor": "#0f172a",
          "textColor": "#94a3b8",
          "activeTextColor": "#ffffff"
        },
        "rightPanel": {
          "backgroundColor": "#1e293b",
          "textColor": "#e2e8f0"
        },
        "typography": {
          "fontFamily": "Inter, system-ui, -apple-system, sans-serif",
          "headings": {
            "fontFamily": "Inter, system-ui, -apple-system, sans-serif",
            "fontWeight": "700"
          },
          "code": {
            "fontFamily": "JetBrains Mono, monospace"
          }
        }
      }'
    ></redoc>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  </body>
</html>
