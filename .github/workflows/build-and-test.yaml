name: Build & Tests

on:
  push:
    branches: ["main", "ci/backend-build-push"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: write

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: JUnit Tests # Name of the check run which will be created
          path: backend/target/surefire-reports/*.xml # Path to test results
          reporter: java-junit # Format of test results

      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2.12.0
        with:
          generate-branches-badge: true
          jacoco-csv-file: backend/target/site/jacoco/jacoco.csv

      - name: Commit badge to repo
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update coverage badges"
          file_pattern: ".github/badges/*.svg"

      - name: Upload Jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1
